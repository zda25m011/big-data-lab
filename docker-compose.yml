# ================================================================
# Z5008 Big Data Lab — Docker Compose Stack
# IIT Madras Zanzibar | Dr. Innocent Nyalala | Spring 2026
#
# Services: Spark (master + 2 workers) | Kafka (KRaft) |
#           MinIO (S3) | MLflow | JupyterLab | Airflow |
#           Grafana | Prometheus | PostgreSQL
#
# Usage:
#   cp .env.example .env
#   docker-compose up -d
#   docker-compose ps          # verify all running
#
# URLs:
#   JupyterLab:  http://localhost:8888  (token: bigdata)
#   Spark UI:    http://localhost:8080
#   MLflow:      http://localhost:5000
#   MinIO:       http://localhost:9001  (admin/bigdata123)
#   Airflow:     http://localhost:8090  (admin/admin)
#   Grafana:     http://localhost:3000  (admin/admin)
#   Prometheus:  http://localhost:9090
# ================================================================

version: '3.8'

# ---- Shared Spark environment ----
x-spark-common: &spark-common
  image: bitnamilegacy/spark:3.5.0
  environment:
    - SPARK_RPC_AUTHENTICATION_ENABLED=no
    - SPARK_RPC_ENCRYPTION_ENABLED=no
    - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
    - SPARK_SSL_ENABLED=no
    - SPARK_USER=spark
    # S3/MinIO config
    - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:-admin}
    - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-bigdata123}
    - SPARK_EXTRA_CLASSPATH=/opt/bitnami/spark/jars/*
  volumes:
    - ./notebooks:/opt/bitnami/spark/work-dir
    - spark-logs:/opt/bitnami/spark/logs
  networks:
    - bigdata-net

services:

  # ============================================================
  # APACHE SPARK CLUSTER
  # ============================================================
  spark-master:
    <<: *spark-common
    container_name: spark-master
    environment:
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
      - SPARK_USER=spark
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:-admin}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-bigdata123}
      - SPARK_MASTER_OPTS=-Dspark.deploy.defaultCores=2
    ports:
      - "8080:8080"   # Spark Master Web UI
      - "7077:7077"   # Spark Master internal port

  spark-worker-1:
    <<: *spark-common
    container_name: spark-worker-1
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
      - SPARK_USER=spark
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:-admin}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-bigdata123}
    ports:
      - "8081:8081"
    depends_on:
      - spark-master

  spark-worker-2:
    <<: *spark-common
    container_name: spark-worker-2
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
      - SPARK_USER=spark
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:-admin}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-bigdata123}
    ports:
      - "8082:8081"
    depends_on:
      - spark-master

  # ============================================================
  # JUPYTERLAB (PySpark + Delta Lake + all libraries)
  # ============================================================
  jupyter:
    image: quay.io/jupyter/pyspark-notebook:spark-3.5.0
    container_name: jupyter
    ports:
      - "8888:8888"
    environment:
      - JUPYTER_TOKEN=${JUPYTER_TOKEN:-bigdata}
      - SPARK_MASTER=spark://spark-master:7077
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:-admin}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-bigdata123}
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      - ./notebooks:/home/jovyan/work
      - ./config/spark-defaults.conf:/usr/local/spark/conf/spark-defaults.conf
    depends_on:
      - spark-master
    networks:
      - bigdata-net

  # ============================================================
  # APACHE KAFKA 3.7 (KRaft mode — no Zookeeper needed)
  # ============================================================
  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    ports:
      - "9092:9092"   # External access from host
      - "9093:9093"   # Controller port (internal)
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk  # Required for KRaft
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - bigdata-net

  # ============================================================
  # MINIO — S3-Compatible Object Storage (our "Data Lake")
  # ============================================================
  minio:
    image: minio/minio:RELEASE.2024-03-15T01-07-19Z
    container_name: minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web Console
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-bigdata123}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - bigdata-net
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9000"]
      interval: 5s
      timeout: 5s
      retries: 5

  # MinIO bucket initialisation (creates 'warehouse' and 'mlflow-artifacts' buckets)
  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 admin bigdata123;
      /usr/bin/mc mb --ignore-existing myminio/warehouse;
      /usr/bin/mc mb --ignore-existing myminio/mlflow-artifacts;
      /usr/bin/mc mb --ignore-existing myminio/kafka-connect;
      echo 'Buckets created successfully';
      exit 0;
      "
    networks:
      - bigdata-net

  # ============================================================
  # POSTGRESQL — Backend database for Airflow and MLflow
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_MULTIPLE_DATABASES: airflow,mlflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./config/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - bigdata-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # MLFLOW — Experiment Tracking + Model Registry
  # ============================================================
  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.10.1
    container_name: mlflow
    ports:
      - "5000:5000"
    environment:
      - MLFLOW_BACKEND_STORE_URI=postgresql://mlflow:mlflow@postgres:5432/mlflow
      - MLFLOW_DEFAULT_ARTIFACT_ROOT=s3://mlflow-artifacts/
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:-admin}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-bigdata123}
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
    command: >
      mlflow server
        --backend-store-uri postgresql://mlflow:mlflow@postgres:5432/mlflow
        --default-artifact-root s3://mlflow-artifacts/
        --host 0.0.0.0
        --port 5000
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - bigdata-net

  # ============================================================
  # APACHE AIRFLOW 2.9 — Pipeline Orchestration
  # ============================================================
  airflow-init:
    image: apache/airflow:2.9.1-python3.11
    container_name: airflow-init
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - _AIRFLOW_DB_MIGRATE=true
      - _AIRFLOW_WWW_USER_CREATE=true
      - _AIRFLOW_WWW_USER_USERNAME=admin
      - _AIRFLOW_WWW_USER_PASSWORD=admin
    command: version
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bigdata-net

  airflow:
    image: apache/airflow:2.9.1-python3.11
    container_name: airflow
    ports:
      - "8090:8080"   # Airflow Web UI
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - AIRFLOW__WEBSERVER__SECRET_KEY=bigdatalab2026
      - AIRFLOW__WEBSERVER__WORKERS=2
    command: webserver
    volumes:
      - ./dags:/opt/airflow/dags
      - airflow-logs:/opt/airflow/logs
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bigdata-net

  airflow-scheduler:
    image: apache/airflow:2.9.1-python3.11
    container_name: airflow-scheduler
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
    command: scheduler
    volumes:
      - ./dags:/opt/airflow/dags
      - airflow-logs:/opt/airflow/logs
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bigdata-net

  # ============================================================
  # PROMETHEUS — Metrics collection
  # ============================================================
  prometheus:
    image: prom/prometheus:v2.50.1
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    networks:
      - bigdata-net

  # ============================================================
  # GRAFANA — Dashboards and Monitoring
  # ============================================================
  grafana:
    image: grafana/grafana:10.3.3
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_SECURITY_ADMIN_USER=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
    depends_on:
      - prometheus
    networks:
      - bigdata-net

# ============================================================
# NETWORKS AND VOLUMES
# ============================================================
networks:
  bigdata-net:
    driver: bridge
    name: bigdata-net

volumes:
  spark-logs:
  kafka-data:
  minio-data:
  postgres-data:
  airflow-logs:
  prometheus-data:
  grafana-data:
